<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#f97316" stroke-width="0.5" opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Orange accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#accent)"/>
  <!-- Logo -->
  <text x="80" y="120" font-family="Impact, sans-serif" font-size="72" font-weight="bold" fill="white" opacity="0.9">ANIME</text>
  <text x="80" y="120" font-family="Impact, sans-serif" font-size="72" font-weight="bold" fill="url(#accent)" dx="310">BULK</text>
  <!-- Tagline -->
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="22" fill="#9ca3af">Train Like Your Favorite Anime Character</text>
  <!-- Divider -->
  <rect x="80" y="200" width="120" height="4" fill="url(#accent)" rx="2"/>
  <!-- Main headline -->
  <text x="80" y="310" font-family="Impact, sans-serif" font-size="96" font-weight="bold" fill="white">SCIENCE-BACKED</text>
  <text x="80" y="420" font-family="Impact, sans-serif" font-size="96" font-weight="bold" fill="url(#accent)">ANIME FITNESS</text>
  <!-- Sub text -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="24" fill="#6b7280">Character workout programs · Nutrition guides · Digital products</text>
  <!-- URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="20" fill="#f97316" opacity="0.7">animebulk.com</text>
</svg>
